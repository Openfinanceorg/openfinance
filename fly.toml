app = 'openfinance-app'
primary_region = 'iad'

[build]

[deploy]
  release_command = 'sh -c "cd /app && pnpm drizzle-kit migrate --config /app/drizzle.config.ts"'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
